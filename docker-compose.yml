services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
  api:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file: backend/.env
    ports:
      - "4000:4000"
    depends_on:
      - mongo
  web:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_API_URL: http://localhost:4000/api
    ports:
      - "5173:5173"
    depends_on:
      - api
volumes:
  mongo-data:
